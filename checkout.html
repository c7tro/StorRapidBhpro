<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الطلب | RAPID BH PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; background: #000; color: #fff; }</style>
</head>
<body class="p-6">

<div class="max-w-xl mx-auto">
    <h1 class="text-3xl font-black italic mb-10 text-center">بيانات التوصيل</h1>
    
    <div class="space-y-6">
        <div>
            <label class="block text-gray-500 mb-2 text-sm">الاسم الكامل</label>
            <input type="text" id="name" class="w-full bg-zinc-900 border border-white/10 p-4 rounded-2xl focus:border-red-600 outline-none">
        </div>
        <div>
            <label class="block text-gray-500 mb-2 text-sm">رقم الجوال</label>
            <input type="tel" id="phone" class="w-full bg-zinc-900 border border-white/10 p-4 rounded-2xl focus:border-red-600 outline-none" placeholder="05x xxxxxxx">
        </div>
        <div>
            <label class="block text-gray-500 mb-2 text-sm">العنوان بالتفصيل (أبوظبي/العين/إلخ..)</label>
            <textarea id="address" class="w-full bg-zinc-900 border border-white/10 p-4 rounded-2xl focus:border-red-600 outline-none h-32"></textarea>
        </div>

        <button onclick="sendToWhatsapp()" class="w-full bg-green-600 py-6 rounded-3xl text-xl font-black shadow-2xl">إرسال الطلب عبر واتساب ✅</button>
    </div>
</div>

<script>
    function sendToWhatsapp() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const address = document.getElementById('address').value;

        if(!name || !phone || !address) return alert("يرجى ملء كافة البيانات");

        let msg = `*طلب جديد من RAPID BH PRO*\n\n`;
        msg += `*الاسم:* ${name}\n`;
        msg += `*الجوال:* ${phone}\n`;
        msg += `*العنوان:* ${address}\n\n`;
        msg += `*المنتجات:*\n`;
        
        let total = 0;
        cart.forEach((item, i) => {
            msg += `${i+1}. ${item.name} (${item.price} AED)\n`;
            total += item.price;
        });

        msg += `\n*الإجمالي النهائي: ${total} AED*`;
        
        window.open(`https://wa.me/971508851549?text=${encodeURIComponent(msg)}`);
        localStorage.removeItem('cart'); // تنظيف السلة بعد الطلب
    }
</script>
</body>
</html>
