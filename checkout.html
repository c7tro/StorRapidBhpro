<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز الدعم والمعلومات | RAPID BH PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; background: #000; color: #fff; }</style>
</head>
<body class="p-8">

<div class="max-w-4xl mx-auto py-20">
    <div id="content-area">
        </div>
</div>

<script>
    const type = new URLSearchParams(window.location.search).get('type');
    const area = document.getElementById('content-area');

    if(type === 'about') {
        area.innerHTML = `
            <h1 class="text-7xl font-black italic text-red-600 mb-10">عن الشركة</h1>
            <p class="text-2xl text-gray-400 leading-relaxed mb-12">بدأنا في <b>RAPID BH PRO</b> من شغفنا بالصناعات الكيميائية في قلب أبوظبي. نحن متخصصون في ابتكار حلول تنظيف بمواصفات عالمية تلبي احتياجات الفنادق، المطاعم، والمنازل الراقية.</p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white/5 p-10 rounded-[40px] border border-white/5">
                    <h4 class="text-gold font-bold mb-4 uppercase tracking-widest">رؤيتنا</h4>
                    <p class="text-sm text-gray-500">أن نكون الخيار الأول في دولة الإمارات للمنظفات الاحترافية بحلول عام 2030.</p>
                </div>
                <div class="bg-white/5 p-10 rounded-[40px] border border-white/5">
                    <h4 class="text-gold font-bold mb-4 uppercase tracking-widest">مهمتنا</h4>
                    <p class="text-sm text-gray-500">توفير منتجات آمنة، فعالة، وبأسعار تنافسية تناسب الجميع.</p>
                </div>
            </div>
            <a href="index.html" class="inline-block mt-20 text-red-600 font-black border-b-2 border-red-600 pb-2">العودة للمتجر</a>
        `;
    } else if(type === 'contact') {
        area.innerHTML = `
            <h1 class="text-7xl font-black italic text-white mb-10">تواصل <span class="text-red-600">معنا</span></h1>
            <div class="space-y-6">
                <div class="bg-white/5 p-8 rounded-[40px] flex items-center gap-6 border border-white/5">
                    <i class="fab fa-whatsapp text-4xl text-green-500"></i>
                    <div>
                        <p class="text-gray-500 text-xs">خدمة العملاء (واتساب)</p>
                        <p class="text-2xl font-black">+971 50 885 1549</p>
                    </div>
                </div>
                <div class="bg-white/5 p-8 rounded-[40px] flex items-center gap-6 border border-white/5">
                    <i class="fas fa-envelope text-4xl text-red-600"></i>
                    <div>
                        <p class="text-gray-500 text-xs">البريد الإلكتروني</p>
                        <p class="text-2xl font-black">info@rapidbhpro.com</p>
                    </div>
                </div>
                <div class="bg-white/5 p-8 rounded-[40px] flex items-center gap-6 border border-white/5">
                    <i class="fas fa-map-marker-alt text-4xl text-blue-500"></i>
                    <div>
                        <p class="text-gray-500 text-xs">المقر الرئيسي</p>
                        <p class="text-2xl font-black">أبوظبي، الإمارات العربية المتحدة</p>
                    </div>
                </div>
            </div>
        `;
    } else if(type === 'complaint') {
        area.innerHTML = `
            <h1 class="text-7xl font-black italic text-red-600 mb-6">تقديم شكوى</h1>
            <p class="text-gray-500 mb-12">نأسف لسماع ذلك، رضاكم هو أولويتنا. يرجى ملء النموذج وسنتواصل معك خلال 24 ساعة.</p>
            <div class="space-y-6">
                <input type="text" placeholder="رقم الطلب" class="w-full bg-white/5 p-6 rounded-3xl border border-white/5 outline-none focus:border-red-600">
                <textarea placeholder="وصف المشكلة بالتفصيل" class="w-full bg-white/5 p-6 rounded-3xl border border-white/5 outline-none focus:border-red-600 h-40"></textarea>
                <button class="w-full bg-red-600 py-6 rounded-3xl font-black text-xl">إرسال الشكوى</button>
            </div>
        `;
    }
</script>
</body>
</html>
