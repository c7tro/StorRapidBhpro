<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة التسوق | RAPID BH PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; background: #000; color: #fff; }</style>
</head>
<body class="p-6">

<div class="max-w-2xl mx-auto">
    <div class="flex justify-between items-center mb-10">
        <h1 class="text-3xl font-black italic">السلة <span class="text-red-600">.</span></h1>
        <a href="index.html" class="text-gray-500 underline text-sm">متابعة التسوق</a>
    </div>

    <div id="cart-items" class="space-y-4 mb-10">
        </div>

    <div class="bg-zinc-900 p-8 rounded-[35px] border border-white/5">
        <div class="flex justify-between mb-4">
            <span>الإجمالي:</span>
            <span id="total-price" class="font-black text-2xl text-red-600">0 AED</span>
        </div>
        <a href="checkout.html" class="block text-center w-full bg-white text-black py-5 rounded-2xl font-black text-lg">إتمام الطلب</a>
    </div>
</div>

<script>
    function renderCart() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const container = document.getElementById('cart-items');
        let total = 0;

        if(cart.length === 0) {
            container.innerHTML = `<p class="text-center text-gray-500 py-10">السلة فارغة حالياً</p>`;
        } else {
            container.innerHTML = cart.map((item, index) => {
                total += item.price;
                return `
                    <div class="flex items-center gap-4 bg-zinc-900/50 p-4 rounded-2xl border border-white/5">
                        <img src="${item.img}" class="w-16 h-16 rounded-xl object-cover">
                        <div class="flex-1">
                            <h4 class="font-bold text-sm">${item.name}</h4>
                            <p class="text-red-600 font-black text-sm">${item.price} AED</p>
                        </div>
                        <button onclick="removeItem(${index})" class="text-gray-600"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            }).join('');
        }
        document.getElementById('total-price').innerText = `${total} AED`;
    }

    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.splice(index, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
    }

    renderCart();
</script>
</body>
</html>
