<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج | RAPID BH PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #000; color: #fff; }
        .btn-add { background: linear-gradient(90deg, #e63946, #9b1c1c); }
    </style>
</head>
<body class="pb-20">

<nav class="p-6 flex justify-between items-center border-b border-white/5">
    <a href="index.html" class="text-2xl"><i class="fas fa-chevron-right"></i></a>
    <span class="font-black italic">PRODUCT DETAILS</span>
    <div></div>
</nav>

<div id="product-content" class="max-w-4xl mx-auto p-6">
    </div>

<div class="max-w-4xl mx-auto p-6 border-t border-white/10 mt-10">
    <h3 class="text-xl font-black mb-6">آراء العملاء ★</h3>
    <div class="space-y-4">
        <div class="bg-white/5 p-4 rounded-2xl">
            <p class="text-gold text-xs mb-1">★★★★★</p>
            <p class="text-sm">"منتج ممتاز جداً، مزيل الدهون مفعوله سحري!"</p>
            <span class="text-[10px] text-gray-500">- زبون من أبوظبي</span>
        </div>
        <div class="bg-white/5 p-4 rounded-2xl">
            <p class="text-gold text-xs mb-1">★★★★★</p>
            <p class="text-sm">"العود الملكي ريحته فخمة جداً وثابتة."</p>
            <span class="text-[10px] text-gray-500">- زبون من العين</span>
        </div>
    </div>
</div>

<script>
    const PRODUCTS = [
        { id: 1, name: "مزيل الشحوم والزيوت", price: 15, img: "https://i.ibb.co/KzxfrNkC/IMG-7281.jpg", sales: "3,200+", desc: "أقوى تركيبة كيميائية لإزالة الدهون المحروقة والشحوم من الأفران والمحركات." },
        { id: 2, name: "مزيل البقع الصعبة", price: 15, img: "https://i.ibb.co/3mcb1trt/IMG-7284.jpg", sales: "2,150+", desc: "يزيل بقع الحبر والقهوة والدم من الأقمشة والسجاد فوراً." },
        { id: 3, name: "معطر جنات (فواكه)", price: 15, img: "https://i.ibb.co/Y7B86C54/IMG-7279.jpg", sales: "1,400+", desc: "رائحة منعشة تدوم طويلاً في المكان." },
        { id: 4, name: "معطر جنات (زهور)", price: 15, img: "https://i.ibb.co/V0nJW4CY/IMG-7280.jpg", sales: "1,800+", desc: "لمسة من الأناقة مع عبير الزهور البيضاء." },
        { id: 5, name: "معطر جنات (عطور عربية)", price: 15, img: "https://i.ibb.co/YF8sD3p2/IMG-7285.jpg", sales: "+4,500", desc: "ثبات عالي جداً يناسب المجالس والفرش." },
        { id: 6, name: "معطر جنات (عود ملكي)", price: 15, img: "https://i.ibb.co/9mSytFrM/IMG-7278.jpg", sales: "+5,200", desc: "عود ملكي فاخر للأذواق الرفيعة." },
        { id: 7, name: "بوكس التوفير (12 حبة)", price: 150, img: "https://i.ibb.co/9kCQjSsy/IMG-7517.jpg", sales: "الأكثر طلباً", desc: "بوكس كامل يحتوي على 12 عبوة من اختيارك بسعر مخفض." }
    ];

    const urlParams = new URLSearchParams(window.location.search);
    const productId = parseInt(urlParams.get('id'));
    const p = PRODUCTS.find(x => x.id === productId);

    if(p) {
        document.getElementById('product-content').innerHTML = `
            <img src="${p.img}" class="w-full h-[400px] object-cover rounded-[40px] mb-8">
            <div class="flex justify-between items-start mb-4">
                <h1 class="text-4xl font-black italic text-red-600">${p.name}</h1>
                <span class="bg-green-600/20 text-green-500 px-3 py-1 rounded-lg text-xs font-bold">متوفر</span>
            </div>
            <div class="flex items-center gap-4 mb-6">
                <span class="text-2xl font-bold">${p.price} AED</span>
                <span class="text-gray-500 text-sm">| مبيعات: ${p.sales}</span>
            </div>
            <p class="text-gray-400 leading-relaxed text-lg mb-10">${p.desc}</p>
            <button onclick="addToCart(${p.id})" class="w-full btn-add py-6 rounded-3xl text-xl font-black shadow-xl">إضافة للسلة 🛒</button>
        `;
    }

    function addToCart(id) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.push(p);
        localStorage.setItem('cart', JSON.stringify(cart));
        alert("تمت الإضافة للسلة بنجاح!");
    }
</script>
</body>
</html>
