<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BH.PRO - Premium Degreaser, Hard Spots Remover & Jannat Al-Fawah Luxury Perfumes. 15 AED only.">
    <title>BH.PRO | Premium Cleaning & Fragrance Solutions</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Playfair+Display:wght@700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f0f0f;
            --gold: #D4AF37;
            --red: #C8102E;
            --text: #eeeeee;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--primary);
            color: var(--text);
            line-height: 1.6;
            transition: all 0.4s ease;
        }
        
        body.rtl {
            font-family: 'Noto Sans Arabic', system-ui, sans-serif;
            direction: rtl;
            text-align: right;
        }
        
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Navbar */
        nav {
            background: rgba(15, 15, 15, 0.98);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #222;
        }
        
        .nav-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 0;
        }
        
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--gold);
            text-decoration: none;
        }
        
        .nav-links {
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        
        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
        }
        
        .lang-switch {
            background: #222;
            color: #fff;
            border: 2px solid var(--gold);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .lang-switch:hover {
            background: var(--gold);
            color: #000;
        }
        
        /* Hero */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), url('https://i.ibb.co/KzxfrNkC/IMG-7281.jpg') center/cover no-repeat;
            height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .hero-content h1 {
            font-size: 3.8rem;
            line-height: 1.1;
            margin-bottom: 1rem;
        }
        
        .hero-content p {
            font-size: 1.4rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        
        .cta-button {
            background: var(--red);
            color: #fff;
            padding: 16px 42px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(200, 16, 46, 0.4);
            transition: all 0.3s;
        }
        
        .cta-button:hover {
            transform: translateY(-5px);
        }
        
        /* Products */
        .products-section {
            padding: 110px 0;
            background: #0a0a0a;
        }
        
        .section-title {
            text-align: center;
            font-size: 2.9rem;
            margin-bottom: 3rem;
            color: #fff;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 25px;
        }
        
        .product-card {
            background: #1a1a1a;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            transition: all 0.4s ease;
        }
        
        .product-card:hover {
            transform: translateY(-15px);
        }
        
        .product-card img {
            width: 100%;
            height: 340px;
            object-fit: cover;
            cursor: zoom-in;
            transition: transform 0.4s;
        }
        
        .product-card img:hover {
            transform: scale(1.05);
        }
        
        .product-info {
            padding: 22px;
        }
        
        .product-name {
            font-size: 1.35rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .price {
            color: var(--gold);
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .box-offer {
            background: linear-gradient(90deg, var(--gold), #f0d48a);
            color: #000;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        /* Modal for full image */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.97);
            z-index: 99999;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }
        
        .modal-content {
            max-width: 92%;
            max-height: 92vh;
            border-radius: 16px;
            box-shadow: 0 0 80px rgba(212, 175, 55, 0.5);
        }
        
        .modal-content img {
            width: 100%;
            height: auto;
            max-height: 92vh;
            object-fit: contain;
            border-radius: 16px;
        }
        
        /* Sticky Cart */
        .sticky-cart {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: #000;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.15rem;
            font-weight: 700;
            box-shadow: 0 15px 45px rgba(212, 175, 55, 0.6);
            z-index: 9998;
            display: flex;
            align-items: center;
            gap: 12px;
            white-space: nowrap;
            cursor: pointer;
        }
        
        /* Floating WhatsApp */
        .whatsapp-float {
            position: fixed;
            bottom: 100px;
            right: 25px;
            background: #25D366;
            color: #fff;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 10px 40px rgba(37, 211, 102, 0.5);
            z-index: 9999;
            cursor: pointer;
        }
        
        /* Footer */
        footer {
            background: #000;
            color: #aaa;
            padding: 70px 0 40px;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .hero-content h1 { font-size: 2.8rem; }
            .sticky-cart { padding: 13px 30px; font-size: 1.05rem; }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <div class="container nav-content">
            <a href="#" class="logo">BH.PRO</a>
            
            <div class="nav-links">
                <a href="#products" id="nav-products">Products</a>
                <a href="#offers" id="nav-offers">Special Offers</a>
                <button onclick="toggleLanguage()" class="lang-switch" id="lang-btn">العربية</button>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <h1 id="hero-title">Powerful Cleaning.<br>Timeless Fragrance.</h1>
                <p id="hero-subtitle">Professional degreasers &amp; luxury perfumes – 15 AED only</p>
                <button onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})" class="cta-button" id="hero-cta">Shop Now – اطلب الآن</button>
            </div>
        </div>
    </section>

    <!-- Products Section -->
    <section id="products" class="products-section">
        <div class="container">
            <h2 class="section-title" id="products-title">Our Premium Collection</h2>
            <div class="products-grid" id="products-grid"></div>
        </div>
    </section>

    <!-- Special Box Offer -->
    <section id="offers" style="background: linear-gradient(135deg, #1a1a1a, #000); padding: 90px 0; text-align:center;">
        <div class="container">
            <h2 id="box-title" style="color:var(--gold); font-size:2.8rem;">Special Box Offer</h2>
            <p id="box-subtitle" style="font-size:1.4rem; max-width:700px; margin:20px auto;">Mix &amp; Match any 12 pieces for only <strong style="color:var(--gold);">150 AED</strong></p>
            <button onclick="orderBox()" class="cta-button" style="background:var(--gold); color:#000;">Order 12 for 150 AED – اطلب ١٢ بـ ١٥٠ درهم</button>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p style="margin-bottom:10px;">Contact us on WhatsApp:</p>
            <p><strong>+971 50 885 1549</strong></p>
            <div style="margin-top:40px; font-size:0.9rem;">© 2026 BH.PRO – All Rights Reserved</div>
        </div>
    </footer>

    <!-- Full Image Modal -->
    <div id="imageModal" class="image-modal" onclick="if(event.target.id === 'imageModal') closeModal()">
        <div class="modal-content" onclick="event.stopImmediatePropagation()">
            <img id="modalImage" src="" alt="Product View">
        </div>
    </div>

    <!-- Sticky Cart Button -->
    <button onclick="openCart()" class="sticky-cart" id="sticky-cart-btn">
        🛒 <span id="cart-text">Your Cart</span>
        <span id="cart-count" style="background:#000; color:#fff; border-radius:50%; padding:2px 8px; font-size:0.9rem;"></span>
    </button>

    <!-- Floating WhatsApp -->
    <div onclick="openGeneralWhatsApp()" class="whatsapp-float">💬</div>

    <script>
        // ==================== PRODUCT DATA ====================
        const products = [
            {
                id: 1,
                nameEn: "BH.PRO Burnt Oil & Grease Remover",
                nameAr: "مزيل الزيوت والشحوم المحترقة BH.PRO",
                image: "https://i.ibb.co/KzxfrNkC/IMG-7281.jpg",
                price: 15,
                descEn: "Industrial strength – removes burnt oil & grease in 60 seconds. Not safe for skin.",
                descAr: "قوة صناعية – يزيل الزيوت والشحوم المحترقة في 60 ثانية. غير آمن على الجلد."
            },
            {
                id: 2,
                nameEn: "BH.PRO Hard Spots Remover",
                nameAr: "مزيل البقع الصعبة BH.PRO",
                image: "https://i.ibb.co/3mcb1trt/IMG-7284.jpg",
                price: 15,
                descEn: "Safe on hands – effective pre-wash stain remover with reliable results.",
                descAr: "آمن على اليدين – مزيل فعال للبقع قبل الغسيل بنتائج موثوقة."
            },
            {
                id: 3,
                nameEn: "Jannat Al-Fawah Strong Perfume (Purple)",
                nameAr: "عطر جنة الفواح القوي (بنفسجي)",
                image: "https://i.ibb.co/Y7B86C54/IMG-7279.jpg",
                price: 15,
                descEn: "Powerful long-lasting fragrance with wide diffusion.",
                descAr: "عطر قوي طويل الأمد مع انتشار رائع."
            },
            {
                id: 4,
                nameEn: "Jannat Al-Fawah Soft Perfume (Red)",
                nameAr: "عطر جنة الفواح الناعم (أحمر)",
                image: "https://i.ibb.co/V0nJW4CY/IMG-7280.jpg",
                price: 15,
                descEn: "Elegant soft fragrance with high stability.",
                descAr: "عطر ناعم أنيق مع ثبات عالي."
            },
            {
                id: 5,
                nameEn: "Jannat Al-Fawah Luxury Perfume (Blue)",
                nameAr: "عطر جنة الفواح الفاخر (أزرق)",
                image: "https://i.ibb.co/YF8sD3p2/IMG-7285.jpg",
                price: 15,
                descEn: "Premium luxury scent with outstanding performance.",
                descAr: "رائحة فاخرة مميزة بأداء استثنائي."
            },
            {
                id: 6,
                nameEn: "Jannat Al-Fawah Royal Oud Perfume (Brown)",
                nameAr: "عطر جنة الفواح العود الملكي (بني)",
                image: "https://i.ibb.co/9mSytFrM/IMG-7278.jpg",
                price: 15,
                descEn: "Rich Royal Oud fragrance with deep sophisticated notes.",
                descAr: "عود ملكي غني بنكهات عميقة وأنيقة."
            }
        ];

        // ==================== GLOBAL VARIABLES ====================
        let currentLang = 'en';
        let cart = [];

        // ==================== RENDER PRODUCTS ====================
        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.image}" alt="${currentLang === 'en' ? product.nameEn : product.nameAr}" onclick="showFullImage('${product.image}')">
                    <div class="product-info">
                        <div class="box-offer">12 for 150 AED</div>
                        <h3 class="product-name">${currentLang === 'en' ? product.nameEn : product.nameAr}</h3>
                        <div class="price">${product.price} AED</div>
                        <p style="margin:12px 0 20px; font-size:0.98rem;">${currentLang === 'en' ? product.descEn : product.descAr}</p>
                        <div style="display:flex; gap:12px;">
                            <button onclick="viewDetails(${product.id}); event.stopImmediatePropagation();" style="flex:1; padding:14px; background:transparent; border:2px solid #555; color:#ddd; border-radius:8px; font-weight:600;">Details</button>
                            <button onclick="addToCart(${product.id}); event.stopImmediatePropagation();" style="flex:1; padding:14px; background:var(--red); color:#fff; border:none; border-radius:8px; font-weight:600;">Add to Cart</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // ==================== IMAGE MODAL ====================
        function showFullImage(src) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modalImg.src = src;
            modal.style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        // ==================== LANGUAGE SWITCH ====================
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            document.body.classList.toggle('rtl', currentLang === 'ar');
            document.getElementById('lang-btn').textContent = currentLang === 'en' ? 'العربية' : 'English';
            
            // Update texts
            document.getElementById('hero-title').innerHTML = currentLang === 'en' 
                ? "Powerful Cleaning.<br>Timeless Fragrance." 
                : "تنظيف قوي.<br>عطر خالد.";
            document.getElementById('hero-subtitle').textContent = currentLang === 'en' 
                ? "Professional degreasers & luxury perfumes – 15 AED only" 
                : "مزيلات شحوم احترافية وعطور فاخرة – ١٥ درهم فقط";
            document.getElementById('products-title').textContent = currentLang === 'en' ? "Our Premium Collection" : "مجموعتنا الفاخرة";
            document.getElementById('box-title').textContent = currentLang === 'en' ? "Special Box Offer" : "عرض الصندوق الخاص";
            document.getElementById('box-subtitle').innerHTML = currentLang === 'en' 
                ? 'Mix &amp; Match any 12 pieces for only <strong style="color:var(--gold);">150 AED</strong>'
                : 'اخلط وطابق أي ١٢ قطعة مقابل <strong style="color:var(--gold);">١٥٠ درهم</strong>';
            document.getElementById('cart-text').textContent = currentLang === 'en' ? 'Your Cart' : 'سلة التسوق';
            
            renderProducts();
        }

        // ==================== CART FUNCTIONS ====================
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            
            // Update count
            document.getElementById('cart-count').textContent = cart.length;
            
            // Notification
            const notif = document.createElement('div');
            notif.style.cssText = 'position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#D4AF37; color:#000; padding:14px 30px; border-radius:50px; font-weight:700; z-index:99999; box-shadow:0 10px 30px rgba(0,0,0,0.4); white-space:nowrap;';
            notif.textContent = currentLang === 'en' ? `${product.nameEn} added` : `تم إضافة ${product.nameAr}`;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2200);
        }

        function openCart() {
            if (cart.length === 0) {
                alert(currentLang === 'en' ? "Your cart is empty!" : "سلة التسوق فارغة!");
                return;
            }
            
            let message = currentLang === 'en' 
                ? "🧾 *BH.PRO INVOICE / فاتورة*\n\nHello BH.PRO,\n\nI would like to order:\n\n"
                : "🧾 *فاتورة BH.PRO*\n\nمرحبا BH.PRO،\n\nأريد طلب الآتي:\n\n";
            
            let total = 0;
            
            cart.forEach((item, index) => {
                const name = currentLang === 'en' ? item.nameEn : item.nameAr;
                message += `${index + 1}. ${name} × 1\n   15 AED\n`;
                total += 15;
            });
            
            message += `\n────────────────\n`;
            message += currentLang === 'en' 
                ? `Total: ${total} AED\n\nPlease confirm my order. Thank you!`
                : `الإجمالي: ${total} درهم\n\nيرجى تأكيد الطلب. شكراً!`;
            
            // Open WhatsApp with full invoice message
            window.open(`https://wa.me/971508851549?text=${encodeURIComponent(message)}`, '_blank');
            
            // Clear cart after sending
            cart = [];
            document.getElementById('cart-count').textContent = '';
        }

        // ==================== OTHER FUNCTIONS ====================
        function viewDetails(id) {
            const product = products.find(p => p.id === id);
            const msg = currentLang === 'en' 
                ? `Hi, I would like more details about ${product.nameEn} (15 AED).`
                : `مرحبا، أريد تفاصيل أكثر عن ${product.nameAr} (١٥ درهم).`;
            window.open(`https://wa.me/971508851549?text=${encodeURIComponent(msg)}`, '_blank');
        }
        
        function orderBox() {
            const msg = currentLang === 'en'
                ? "Hello BH.PRO,\n\nI want the Special Box Offer: 12 pieces for 150 AED (mix & match allowed).\nPlease confirm availability."
                : "مرحبا BH.PRO،\n\nأريد عرض الصندوق الخاص: ١٢ قطعة بـ ١٥٠ درهم (يمكن خلط المنتجات).\nيرجى التأكيد.";
            window.open(`https://wa.me/971508851549?text=${encodeURIComponent(msg)}`, '_blank');
        }
        
        function openGeneralWhatsApp() {
            const msg = currentLang === 'en' 
                ? "Hello BH.PRO, I would like to inquire about your products."
                : "مرحبا BH.PRO، أريد الاستفسار عن منتجاتكم.";
            window.open(`https://wa.me/971508851549?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // ==================== INITIALIZE ====================
        window.onload = function () {
            renderProducts();
            
            // Close modal with Escape key
            document.addEventListener('keydown', (e) => {
                if (e.key === "Escape") {
                    const modal = document.getElementById('imageModal');
                    if (modal.style.display === 'flex') closeModal();
                }
            });
            
            console.log('%c✅ BH.PRO Website Ready – Dark Mode + Full Cart + Invoice WhatsApp', 'color:#D4AF37; font-size:16px; font-weight:bold;');
        };
    </script>
</body>
</html>
