<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BH.PRO - Premium Cleaning Products & Jannat Al-Fawah Luxury Perfumes. Professional results at 15 AED.">
    <title>BH.PRO | تنظيف احترافي وعطور فاخرة</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Playfair+Display:wght@700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f0f0f;
            --accent: #C8102E;     /* Red as main accent */
            --darkred: #9B0F23;
            --text: #eeeeee;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--primary);
            color: var(--text);
            line-height: 1.6;
        }
        
        body.rtl {
            font-family: 'Noto Sans Arabic', system-ui, sans-serif;
            direction: rtl;
            text-align: right;
        }
        
        .container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }
        
        /* Navbar */
        nav {
            background: rgba(15,15,15,0.98);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #222;
        }
        
        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 0;
        }
        
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.3rem;
            color: var(--accent);
            font-weight: 700;
            text-decoration: none;
        }
        
        .lang-switch {
            background: #222;
            color: #fff;
            border: 2px solid var(--accent);
            padding: 10px 22px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* Hero - New Clean House Image */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)), url('https://i.ibb.co/od58j/how-house-cleaning-supports-a-healthier-home.jpg') center/cover no-repeat;
            height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .hero-content h1 {
            font-size: 3.6rem;
            line-height: 1.1;
            margin-bottom: 1rem;
        }
        
        .hero-content p {
            font-size: 1.35rem;
            margin-bottom: 2rem;
            opacity: 0.95;
        }
        
        .cta-button {
            background: var(--accent);
            color: #fff;
            padding: 16px 42px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(200, 16, 46, 0.5);
        }
        
        /* Products Section */
        .products-section {
            padding: 100px 0;
            background: #0a0a0a;
        }
        
        .section-title {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 3rem;
            color: #fff;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 25px;
        }
        
        .product-card {
            background: #1a1a1a;
            border-radius: 18px;
            overflow: hidden;
            transition: all 0.4s;
        }
        
        .product-card:hover {
            transform: translateY(-12px);
        }
        
        .product-card img {
            width: 100%;
            height: 340px;
            object-fit: cover;
            cursor: zoom-in;
        }
        
        .product-info {
            padding: 22px;
        }
        
        .product-name {
            font-size: 1.35rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .price {
            color: var(--accent);
            font-size: 1.7rem;
            font-weight: 700;
        }
        
        .box-offer {
            background: var(--accent);
            color: #fff;
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        /* Image Modal */
        .image-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.97);
            z-index: 99999;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content img {
            max-width: 92%;
            max-height: 92vh;
            border-radius: 16px;
            box-shadow: 0 0 60px rgba(200,16,46,0.4);
        }
        
        /* Cart Sidebar (New improved cart) */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -420px;
            width: 420px;
            height: 100%;
            background: #1a1a1a;
            box-shadow: -10px 0 40px rgba(0,0,0,0.6);
            z-index: 100000;
            transition: right 0.4s ease;
            overflow-y: auto;
            padding: 25px;
        }
        
        body.rtl .cart-sidebar {
            right: auto;
            left: -420px;
        }
        
        .cart-sidebar.open {
            right: 0;
        }
        
        body.rtl .cart-sidebar.open {
            left: 0;
        }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #333;
        }
        
        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #222;
            padding: 6px 12px;
            border-radius: 8px;
        }
        
        .quantity-btn {
            width: 32px;
            height: 32px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1.2rem;
            cursor: pointer;
        }
        
        /* Sticky Buy Button */
        .sticky-buy {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #fff;
            padding: 16px 38px;
            border-radius: 50px;
            font-size: 1.15rem;
            font-weight: 700;
            box-shadow: 0 15px 45px rgba(200, 16, 46, 0.6);
            z-index: 9998;
            cursor: pointer;
            white-space: nowrap;
        }
        
        /* Floating WhatsApp */
        .whatsapp-float {
            position: fixed;
            bottom: 100px;
            right: 25px;
            background: #25D366;
            color: #fff;
            width: 68px;
            height: 68px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 10px 35px rgba(37,211,102,0.5);
            z-index: 9999;
            cursor: pointer;
        }
        
        footer {
            background: #000;
            color: #aaa;
            padding: 60px 0 30px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <div class="container nav-content">
            <a href="#" class="logo">BH.PRO</a>
            <div>
                <button onclick="toggleLanguage()" class="lang-switch" id="lang-btn">العربية</button>
            </div>
        </div>
    </nav>

    <!-- Hero - Clean House Image -->
    <section class="hero">
        <div class="container">
            <div class="hero-content" style="max-width:720px;">
                <h1 id="hero-title">Clean Home.<br>Beautiful Life.</h1>
                <p id="hero-subtitle">Powerful cleaning products &amp; long-lasting luxury fragrances</p>
                <button onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})" class="cta-button">Shop Now – اطلب الآن</button>
            </div>
        </div>
    </section>

    <!-- Products -->
    <section id="products" class="products-section">
        <div class="container">
            <h2 class="section-title" id="products-title">Our Premium Collection</h2>
            <div class="products-grid" id="products-grid"></div>
        </div>
    </section>

    <!-- Box Offer -->
    <section style="background:#111; padding:80px 0; text-align:center;">
        <div class="container">
            <h2 id="box-title" style="color:var(--accent); font-size:2.7rem;">Special Box Offer</h2>
            <p id="box-subtitle" style="font-size:1.35rem; max-width:680px; margin:20px auto;">
                Mix &amp; Match any 12 pieces for only <strong style="color:var(--accent);">150 AED</strong>
            </p>
            <button onclick="orderBox()" class="cta-button" style="background:#fff; color:#000;">Order Box – اطلب الصندوق</button>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>Contact us: <strong>+971 50 885 1549</strong></p>
        <div style="margin-top:30px; font-size:0.9rem;">© 2026 BH.PRO</div>
    </footer>

    <!-- Image Modal -->
    <div id="imageModal" class="image-modal" onclick="if(event.target.id==='imageModal') closeModal()">
        <div class="modal-content" onclick="event.stopImmediatePropagation()">
            <img id="modalImage" src="" alt="">
        </div>
    </div>

    <!-- Cart Sidebar -->
    <div id="cartSidebar" class="cart-sidebar">
        <h2 id="cart-title" style="margin-bottom:20px; color:var(--accent);">Your Cart</h2>
        <div id="cart-items"></div>
        
        <div style="margin-top:30px; padding-top:20px; border-top:2px solid #333;">
            <div style="display:flex; justify-content:space-between; font-size:1.3rem; font-weight:700; margin-bottom:20px;">
                <span id="total-text">Total</span>
                <span id="cart-total">0 AED</span>
            </div>
            <button onclick="checkoutCart()" style="width:100%; padding:16px; background:var(--accent); color:#fff; border:none; border-radius:12px; font-size:1.15rem; font-weight:700;">
                Send Order via WhatsApp
            </button>
            <button onclick="closeCart()" style="width:100%; margin-top:12px; padding:14px; background:#333; color:#ddd; border:none; border-radius:12px;">
                Close
            </button>
        </div>
    </div>

    <!-- Sticky Buy Button -->
    <button onclick="openCart()" class="sticky-buy" id="sticky-buy-btn">
        🛒 View Cart / عرض السلة
    </button>

    <!-- Floating WhatsApp -->
    <div onclick="openGeneralWhatsApp()" class="whatsapp-float">💬</div>

    <script>
        // Product Data
        const products = [
            { id:1, nameEn:"BH.PRO Burnt Oil & Grease Remover", nameAr:"مزيل الزيوت والشحوم المحترقة BH.PRO", image:"https://i.ibb.co/KzxfrNkC/IMG-7281.jpg", price:15,
              descEn:"Removes burnt oil & grease in 60 seconds. Not safe for skin.", descAr:"يزيل الزيوت والشحوم في 60 ثانية. غير آمن على الجلد." },
            { id:2, nameEn:"BH.PRO Hard Spots Remover", nameAr:"مزيل البقع الصعبة BH.PRO", image:"https://i.ibb.co/3mcb1trt/IMG-7284.jpg", price:15,
              descEn:"Safe on hands – effective pre-wash stain remover.", descAr:"آمن على اليدين – مزيل فعال للبقع قبل الغسيل." },
            { id:3, nameEn:"Jannat Al-Fawah Strong Perfume (Purple)", nameAr:"عطر جنة الفواح القوي (بنفسجي)", image:"https://i.ibb.co/Y7B86C54/IMG-7279.jpg", price:15,
              descEn:"Powerful long-lasting fragrance with wide diffusion.", descAr:"عطر قوي طويل الأمد مع انتشار رائع." },
            { id:4, nameEn:"Jannat Al-Fawah Soft Perfume (Red)", nameAr:"عطر جنة الفواح الناعم (أحمر)", image:"https://i.ibb.co/V0nJW4CY/IMG-7280.jpg", price:15,
              descEn:"Elegant soft fragrance with high stability.", descAr:"عطر ناعم أنيق مع ثبات عالي." },
            { id:5, nameEn:"Jannat Al-Fawah Luxury Perfume (Blue)", nameAr:"عطر جنة الفواح الفاخر (أزرق)", image:"https://i.ibb.co/YF8sD3p2/IMG-7285.jpg", price:15,
              descEn:"Premium luxury scent with outstanding performance.", descAr:"رائحة فاخرة مميزة بأداء استثنائي." },
            { id:6, nameEn:"Jannat Al-Fawah Royal Oud Perfume (Brown)", nameAr:"عطر جنة الفواح العود الملكي (بني)", image:"https://i.ibb.co/9mSytFrM/IMG-7278.jpg", price:15,
              descEn:"Rich Royal Oud with deep sophisticated notes.", descAr:"عود ملكي غني بنكهات عميقة وأنيقة." }
        ];

        let currentLang = 'en';
        let cart = [];   // array of {product, quantity}

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${p.image}" onclick="showFullImage('${p.image}')" alt="${currentLang==='en'?p.nameEn:p.nameAr}">
                    <div class="product-info">
                        <div class="box-offer">12 for 150 AED</div>
                        <h3 class="product-name">${currentLang==='en'?p.nameEn:p.nameAr}</h3>
                        <div class="price">${p.price} AED</div>
                        <p style="margin:12px 0 18px;font-size:0.97rem;">${currentLang==='en'?p.descEn:p.descAr}</p>
                        <button onclick="addToCart(${p.id});event.stopImmediatePropagation()" style="width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-weight:600;">Add to Cart</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function showFullImage(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            document.body.classList.toggle('rtl', currentLang === 'ar');
            document.getElementById('lang-btn').textContent = currentLang === 'en' ? 'العربية' : 'English';
            
            document.getElementById('hero-title').innerHTML = currentLang === 'en' ? "Clean Home.<br>Beautiful Life." : "منزل نظيف.<br>حياة جميلة.";
            document.getElementById('hero-subtitle').textContent = currentLang === 'en' ? "Powerful cleaning & luxury fragrances" : "تنظيف قوي وعطور فاخرة";
            document.getElementById('products-title').textContent = currentLang === 'en' ? "Our Premium Collection" : "مجموعتنا الفاخرة";
            document.getElementById('box-title').textContent = currentLang === 'en' ? "Special Box Offer" : "عرض الصندوق الخاص";
            document.getElementById('cart-title').textContent = currentLang === 'en' ? "Your Cart" : "سلة التسوق";
            document.getElementById('total-text').textContent = currentLang === 'en' ? "Total" : "الإجمالي";
            
            renderProducts();
            renderCart();
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.product.id === id);
            
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({product: product, quantity: 1});
            }
            
            renderCart();
            openCart();   // auto open cart when adding
        }

        function changeQuantity(id, change) {
            const item = cart.find(i => i.product.id === id);
            if (!item) return;
            
            item.quantity += change;
            if (item.quantity < 1) item.quantity = 1;
            
            renderCart();
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.product.id !== id);
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            let total = 0;
            
            cart.forEach(item => {
                const subtotal = item.product.price * item.quantity;
                total += subtotal;
                
                const div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `
                    <div>
                        <strong>${currentLang==='en' ? item.product.nameEn : item.product.nameAr}</strong><br>
                        <small>${item.product.price} AED × ${item.quantity}</small>
                    </div>
                    <div style="text-align:right;">
                        <div class="quantity-controls">
                            <button class="quantity-btn" onclick="changeQuantity(${item.product.id}, -1)">−</button>
                            <span style="min-width:24px;text-align:center;">${item.quantity}</span>
                            <button class="quantity-btn" onclick="changeQuantity(${item.product.id}, 1)">+</button>
                        </div>
                        <button onclick="removeFromCart(${item.product.id})" style="margin-top:8px;color:#ff6666;background:none;border:none;font-size:0.9rem;">Remove</button>
                    </div>
                `;
                container.appendChild(div);
            });
            
            document.getElementById('cart-total').textContent = total + " AED";
        }

        function openCart() {
            renderCart();
            document.getElementById('cartSidebar').classList.add('open');
        }

        function closeCart() {
            document.getElementById('cartSidebar').classList.remove('open');
        }

        function checkoutCart() {
            if (cart.length === 0) return;
            
            let message = currentLang === 'en' 
                ? "🛍️ *BH.PRO Order / طلب*\n\nHello BH.PRO,\n\nMy order:\n\n"
                : "🛍️ *طلب BH.PRO*\n\nمرحبا BH.PRO،\n\nطلبي:\n\n";
            
            let total = 0;
            
            cart.forEach(item => {
                const name = currentLang === 'en' ? item.product.nameEn : item.product.nameAr;
                message += `• ${name} × ${item.quantity}   (${item.product.price * item.quantity} AED)\n`;
                total += item.product.price * item.quantity;
            });
            
            message += `\n──────────────────\n`;
            message += currentLang === 'en' 
                ? `Total: ${total} AED\n\nPlease confirm and send delivery details. Thank you!`
                : `الإجمالي: ${total} درهم\n\nيرجى التأكيد وإرسال تفاصيل التوصيل. شكراً!`;
            
            window.open(`https://wa.me/971508851549?text=${encodeURIComponent(message)}`, '_blank');
            
            // Clear cart after checkout
            cart = [];
            closeCart();
        }

        function orderBox() {
            const msg = currentLang === 'en'
                ? "I want the Special Box: 12 pieces for 150 AED (mix & match). Please confirm."
                : "أريد عرض الصندوق الخاص: ١٢ قطعة بـ ١٥٠ درهم (يمكن الخلط). يرجى التأكيد.";
            window.open(`https://wa.me/971508851549?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function openGeneralWhatsApp() {
            const msg = currentLang === 'en' ? "Hello BH.PRO, I have a question." : "مرحبا BH.PRO، لدي استفسار.";
            window.open(`https://wa.me/971508851549?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // Initialize
        window.onload = () => {
            renderProducts();
            
            // Close modal with Escape
            document.addEventListener('keydown', e => {
                if (e.key === "Escape") {
                    const modal = document.getElementById('imageModal');
                    if (modal.style.display === 'flex') closeModal();
                    closeCart();
                }
            });
            
            console.log('%c✅ BH.PRO Website Updated – Red Theme + Enhanced Cart', 'color:#C8102E; font-size:15px;');
        };
    </script>
</body>
</html>
