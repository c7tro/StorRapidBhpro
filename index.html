<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAPID BH PRO | المتجر الرسمي الشامل</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --primary: #e63946; --gold: #c5a028; --dark: #000000; --zinc-dark: #09090b; --card: #0f0f11; --glass: rgba(10, 10, 10, 0.9); --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); --text-color: #ffffff; --text-muted: #9ca3af; --border-color: rgba(255,255,255,0.05); --fb-bg: #18191a; --fb-bubble: #242526; --fb-pop: #3a3b3c; --fb-text: #e4e6eb; --fb-gray: #b0b3b8; }
        body.light-mode { --dark: #f0f0f0; --zinc-dark: #e5e5e5; --card: #ffffff; --glass: rgba(255, 255, 255, 0.95); --text-color: #111111; --text-muted: #555555; --border-color: rgba(0,0,0,0.08); --fb-bg: #f0f2f5; --fb-bubble: #e4e6eb; --fb-pop: #d8dadf; --fb-text: #1c1e21; --fb-gray: #65676b; background-color: #f5f5f7; color: #111111; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--dark); color: var(--text-color); overflow-x: hidden; line-height: 1.6; transition: background 0.5s ease; }
        .glass-nav { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(230, 57, 70, 0.1); padding: 1.2rem 2.5rem !important; }
        .hero-section { position: relative; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; }
        .hero-bg { position: absolute; inset: 0; background-image: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,1)), url('https://i.ibb.co/9kCQjSsy/IMG-7517.jpg'); background-size: cover; background-position: center 30%; z-index: 1; transform: scale(1.05); animation: heroZoom 10s infinite alternate; }
        @keyframes heroZoom { from { transform: scale(1.05); } to { transform: scale(1.1); } }
        .side-panel { position: fixed; top: 0; height: 100vh; width: 420px; max-width: 85vw; background: var(--glass); backdrop-filter: blur(40px); z-index: 5000; transition: var(--transition); }
        #sidebar { left: -450px; border-right: 1px solid rgba(197, 160, 40, 0.3); }
        #cart-panel { right: -450px; border-left: 1px solid rgba(230, 57, 70, 0.3); }
        .side-panel.active-left { left: 0 !important; }
        .side-panel.active-right { right: 0 !important; }
        .product-card { background: var(--card); border: 1px solid var(--border-color); border-radius: 40px; overflow: hidden; transition: var(--transition); position: relative; }
        .product-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .image-box { position: relative; height: 380px; margin: 15px; border-radius: 30px; overflow: hidden; background: #151518; transition: var(--transition); }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }
        .slider-container { position: relative; width: 100%; height: 100%; overflow: hidden; }
        .slider-track { display: flex; transition: transform 0.5s ease; height: 100%; }
        .slide { min-width: 100%; height: 100%; }
        .slider-dots { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); }
        .dot.active { background: var(--primary); width: 20px; border-radius: 10px; }
        .btn-premium { background: linear-gradient(135deg, var(--primary) 0%, #9b1c1c 100%); color: white; font-weight: 900; transition: var(--transition); }
        
        /* التنسيقات الخاصة بتبديل العرض */
        .view-2 .product-card { border-radius: 25px; }
        .view-2 .image-box { height: 220px; margin: 8px; border-radius: 20px; }
        .view-2 .product-card h3 { font-size: 1.1rem; margin-bottom: 4px; }
        .view-2 .product-card p { font-size: 0.75rem; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .view-2 .btn-premium { padding: 12px; font-size: 0.85rem; border-radius: 15px; }
        
        #theme-toggle { position: relative; width: 52px; height: 28px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .img-fullscreen { position: fixed; inset: 0; z-index: 100000; background: rgba(0,0,0,0.98); display: flex; align-items: center; justify-content: center; cursor: zoom-out; }
        .fb-comment-bubble { background-color: var(--fb-bubble); padding: 12px 18px; border-radius: 20px; max-width: 90%; }
    </style>
</head>
<body>

<div id="image-overlay" class="img-fullscreen hidden" onclick="this.classList.add('hidden')"><img src="" id="full-img" class="max-w-full max-h-full p-4"></div>
<div id="master-overlay" class="fixed inset-0 bg-black/80 hidden z-[4500]" onclick="closePanels()"></div>

<div id="box-modal" class="fixed inset-0 z-[6000] bg-black/95 hidden items-center justify-center p-4 backdrop-blur-2xl">
    <div class="bg-zinc-900 w-full max-w-2xl rounded-[50px] p-8 border border-white/5 max-h-[90vh] overflow-y-auto text-white">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-black text-red-600" data-ar="صمم بوكس الـ 12" data-en="Design 12-Pack">صمم بوكس الـ 12</h2>
            <div class="bg-red-600/20 px-6 py-3 rounded-2xl border border-red-600/30"><span id="box-counter" class="text-2xl font-black">12</span></div>
        </div>
        <div id="box-options-list" class="space-y-4 mb-10"></div>
        <div class="flex gap-4">
            <button onclick="confirmBoxSelection()" id="confirm-box-btn" class="flex-1 bg-green-600 py-6 rounded-3xl font-black text-xl opacity-40 pointer-events-none">إضافة للسلة</button>
            <button onclick="closeBoxModal()" class="px-10 bg-white/5 py-6 rounded-3xl font-bold">إلغاء</button>
        </div>
    </div>
</div>

<nav class="fixed top-0 w-full z-[4000] py-8 px-10 transition-all" id="nav-bar">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <button onclick="openSidebar()" class="text-3xl"><i class="fas fa-bars-staggered"></i></button>
        <div class="text-3xl font-black font-['Montserrat'] italic">RAPID BH<span class="text-red-600">PRO</span></div>
        <div class="flex items-center gap-5">
            <button onclick="toggleTheme()" id="theme-toggle" class="text-sm"><i class="fas fa-moon"></i></button>
            <button onclick="toggleLang()" class="bg-white/5 px-4 py-2 rounded-xl font-black" id="lang-switcher">EN</button>
            <button onclick="openCart()" class="relative">
                <div id="cart-dot" class="absolute -top-2 -right-2 bg-red-600 text-[10px] w-6 h-6 rounded-full flex items-center justify-center font-black">0</div>
                <i class="fas fa-shopping-bag text-3xl"></i>
            </button>
        </div>
    </div>
</nav>

<aside id="sidebar" class="side-panel p-12 flex flex-col text-white">
    <button onclick="closePanels()" class="text-5xl self-end">&times;</button>
    <nav class="flex flex-col gap-10 text-5xl font-black italic mt-20">
        <a onclick="navigate('hero')" data-ar="الرئيسية" data-en="Home">الرئيسية</a>
        <a onclick="navigate('store')" data-ar="المتجر" data-en="Store">المتجر</a>
        <a onclick="navigate('reviews')" data-ar="الآراء" data-en="Reviews">الآراء</a>
    </nav>
</aside>

<aside id="cart-panel" class="side-panel flex flex-col text-white">
    <div class="p-10 border-b border-white/5 flex justify-between items-center"><h2 class="text-3xl font-black italic">سلة التسوق</h2><button onclick="closePanels()" class="text-4xl">&times;</button></div>
    <div id="cart-content" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
    <div class="p-10 bg-black/80 border-t border-white/10"><div class="flex justify-between text-2xl font-black mb-8"><span>المجموع:</span><span id="cart-total" class="text-gold">0 AED</span></div><button onclick="showCheckout()" class="w-full btn-premium py-6 rounded-[25px] text-xl font-black">إتمام الطلب</button></div>
</aside>

<section id="hero" class="hero-section"><div class="hero-bg"></div><div class="relative z-10 text-center"><h1 class="text-7xl md:text-[140px] font-black italic animate__animated animate__zoomIn">RAPID <span class="text-red-600">BH</span></h1><button onclick="navigate('store')" class="btn-premium px-12 py-5 rounded-full text-xl mt-8">اكتشف المجموعة</button></div></section>

<section id="store" class="py-24 px-6">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-16 px-2">
            <h2 class="text-4xl font-black italic" data-ar="المتجر" data-en="Store">المتجر</h2>
            <div class="flex gap-2 bg-white/5 p-1 rounded-2xl border border-white/10">
                <button onclick="changeView(1)" id="view-btn-1" class="w-12 h-12 flex items-center justify-center rounded-xl transition-all"><i class="fas fa-stop"></i></button>
                <button onclick="changeView(2)" id="view-btn-2" class="w-12 h-12 flex items-center justify-center rounded-xl bg-red-600 transition-all text-white"><i class="fas fa-th-large"></i></button>
            </div>
        </div>
        <div id="products-grid" class="grid transition-all duration-500 gap-4 md:gap-10"></div>
    </div>
</section>

<section id="reviews" class="py-24 bg-zinc-950 px-6"><div class="max-w-4xl mx-auto text-white"><h3 class="text-4xl font-black italic mb-12 text-center">آراء العملاء</h3><div id="fb-comment-list" class="space-y-6 mb-12"></div><div class="bg-white/5 p-6 rounded-3xl space-y-4"><input type="text" id="reviewer-name" placeholder="الاسم" class="w-full bg-black p-4 rounded-xl border border-white/10 text-white outline-none"><textarea id="reviewer-text" placeholder="رأيك في منتجاتنا" class="w-full bg-black p-4 rounded-xl border border-white/10 text-white outline-none"></textarea><button onclick="postComment()" class="btn-premium px-10 py-4 rounded-xl font-bold">نشر رأيك</button></div></div></section>

<footer class="py-20 text-center border-t border-white/10"><div class="text-2xl font-black italic mb-4">RAPID BH<span class="text-red-600">PRO</span></div><p class="text-gray-600">© 2026 - ABU DHABI, UAE</p></footer>

<div id="checkout-modal" class="fixed inset-0 z-[20000] bg-black hidden items-center justify-center p-6 text-white">
    <div class="bg-zinc-900 w-full max-w-xl rounded-[40px] p-10">
        <h2 class="text-3xl font-black mb-8 text-red-600 italic">بيانات التوصيل</h2>
        <form onsubmit="handleFinalSubmit(event)" class="space-y-6">
            <input type="text" id="c-name" placeholder="الاسم الكامل" class="w-full bg-black border border-white/10 p-5 rounded-2xl" required>
            <input type="tel" id="c-phone" placeholder="رقم الهاتف" class="w-full bg-black border border-white/10 p-5 rounded-2xl" required>
            <button type="submit" class="w-full btn-premium py-6 rounded-2xl font-black text-xl">تأكيد الطلب عبر واتساب</button>
            <button type="button" onclick="closeCheckout()" class="w-full text-gray-500">رجوع</button>
        </form>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://wmbozoabyhoszrukkoek.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ICgREpxCsbDTgmBgSycvTA_mnaxkVge';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const PRODUCTS = [
        { id: 1, name: "معطر عود ملكي", nameEn: "Royal Oud", price: 15, img: "https://i.ibb.co/9mSytFrM/IMG-7278.jpg", info: "ثبات عالي للأقمشة والفرش.", infoEn: "Premium Oud scent for fabrics." },
        { id: 2, name: "معطر العطور العربية", nameEn: "Luxury Fragrance", price: 15, img: "https://i.ibb.co/YF8sD3p2/IMG-7285.jpg", info: "رائحة تدوم لأيام بتركيز عالي.", infoEn: "Signature long-lasting scent." },
        { id: 3, name: "معطر زهور بيضاء", nameEn: "White Flowers", price: 15, img: "https://i.ibb.co/V0nJW4CY/IMG-7280.jpg", info: "انتعاش الزهور الطبيعية للستائر.", infoEn: "Natural floral freshness." },
        { id: 4, name: "معطر فواكه إستوائية", nameEn: "Fresh Fruits", price: 15, img: "https://i.ibb.co/Y7B86C54/IMG-7279.jpg", info: "مزيج فواكه صيفية منعشة.", infoEn: "Tropical summer fruit blend." },
        { id: 5, name: "مزيل البقع الصعبة", nameEn: "Stain Remover", price: 15, images: ["https://i.ibb.co/3mcb1trt/IMG-7284.jpg", "https://i.ibb.co/gZv8StsQ/IMG-2026.jpg"], info: "قوة إزالة البقع المستعصية.", infoEn: "Tough on stains, soft on fabrics." },
        { id: 6, name: "مزيل الدهون والشحوم", nameEn: "Grease Killer", price: 15, images: ["https://i.ibb.co/KzxfrNkC/IMG-7281.jpg", "https://i.ibb.co/mVPB4fsN/IMG-2025.jpg", "https://i.ibb.co/1YW6f6P2/IMG-2024.jpg"], info: "قوة مضاعفة لإزالة الدهون المحروقة.", infoEn: "Heavy duty grease dissolver." },
        { id: 7, name: "بوكس التوفير (12 عبوة)", nameEn: "Mega Pack (12)", price: 150, isBox: true, info: "وفر 30 درهم وصمم مجموعتك الخاصة.", infoEn: "Custom build your pack and save." }
    ];

    let state = { lang: 'ar', cart: JSON.parse(localStorage.getItem('rapid_pro_cart')) || [], boxSelection: {}, comments: [], sliders: {}, currentView: 2 };

    function init() { renderProducts(); fetchComments(); updateUI(); setupNavScroll(); }

    async function fetchComments() {
        const { data } = await supabaseClient.from('comments').select('*').order('created_at', { ascending: false });
        if (data) { state.comments = data; renderFBComments(); }
    }

    async function postComment() {
        const n = document.getElementById('reviewer-name'), t = document.getElementById('reviewer-text');
        if (n.value && t.value) {
            await supabaseClient.from('comments').insert([{ name: n.value, text: t.value }]);
            n.value = ''; t.value = ''; fetchComments();
        }
    }

    function renderFBComments() {
        document.getElementById('fb-comment-list').innerHTML = state.comments.slice(0, 5).map(c => `
            <div class="flex gap-4 items-start animate__animated animate__fadeIn">
                <div class="w-10 h-10 rounded-full bg-red-600 flex items-center justify-center font-black text-white">${c.name[0]}</div>
                <div class="fb-comment-bubble"><div class="font-bold text-xs mb-1 text-gold">${c.name}</div><div class="text-sm">${c.text}</div></div>
            </div>`).join('');
    }

    function changeView(n) {
        state.currentView = n;
        const btn1 = document.getElementById('view-btn-1');
        const btn2 = document.getElementById('view-btn-2');
        if (n === 1) {
            btn1.classList.add('bg-red-600', 'text-white');
            btn2.classList.remove('bg-red-600', 'text-white');
        } else {
            btn2.classList.add('bg-red-600', 'text-white');
            btn1.classList.remove('bg-red-600', 'text-white');
        }
        renderProducts();
    }

    function renderProducts() {
        const grid = document.getElementById('products-grid');
        grid.className = `grid transition-all duration-500 gap-4 md:gap-10 ${state.currentView === 1 ? 'grid-cols-1' : 'grid-cols-2 lg:grid-cols-3 view-2'}`;
        
        grid.innerHTML = PRODUCTS.map(p => {
            let media = p.isBox ? `<div class="image-box flex flex-col items-center justify-center bg-zinc-900 cursor-pointer" onclick="openBoxWizard()"><i class="fas fa-box-open text-6xl text-gold mb-4"></i><span class="font-black text-xs">BOX BUILDER</span></div>` : 
                (p.images ? `<div class="image-box"><div class="slider-container" id="slider-${p.id}"><div class="slider-track" id="track-${p.id}">${p.images.map(img => `<div class="slide"><img src="${img}" onclick="viewImage('${img}')"></div>`).join('')}</div><div class="slider-dots" id="dots-${p.id}">${p.images.map((_,i)=>`<div class="dot ${i==0?'active':''}"></div>`).join('')}</div></div></div>` :
                `<div class="image-box" onclick="viewImage('${p.img}')"><img src="${p.img}"></div>`);
            
            return `<div class="product-card animate__animated animate__fadeIn">
                ${media}
                <div class="${state.currentView === 1 ? 'p-8' : 'p-4'}">
                    <h3 class="font-black italic">${state.lang=='ar'?p.name:p.nameEn}</h3>
                    <p class="text-gray-500 mb-6">${state.lang=='ar'?p.info:p.infoEn}</p>
                    <button onclick="${p.isBox?'openBoxWizard()':`addToCart(${p.id})`}" class="w-full btn-premium py-4 rounded-2xl font-black">
                        ${p.isBox ? (state.lang=='ar'?'تخصيص الآن':'Customize') : `${p.price} AED`}
                    </button>
                </div>
            </div>`;
        }).join('');
        initSliders();
    }

    function initSliders() {
        PRODUCTS.filter(p=>p.images).forEach(p => {
            state.sliders[p.id] = { index: 0, count: p.images.length };
            if (state.sliders[p.id].interval) clearInterval(state.sliders[p.id].interval);
            state.sliders[p.id].interval = setInterval(() => {
                let s = state.sliders[p.id]; s.index = (s.index + 1) % s.count;
                const track = document.getElementById(`track-${p.id}`);
                if (track) {
                    track.style.transform = `translateX(${state.lang=='ar' ? s.index*100 : -s.index*100}%)`;
                    document.getElementById(`dots-${p.id}`).querySelectorAll('.dot').forEach((d,i)=> i==s.index?d.classList.add('active'):d.classList.remove('active'));
                }
            }, 5000);
        });
    }

    function addToCart(id) {
        const p = PRODUCTS.find(x=>x.id==id);
        const ex = state.cart.find(i=>i.id==id && !i.isBox);
        if(ex) ex.qty++; else state.cart.push({...p, qty:1});
        save(); openCart();
    }

    function openBoxWizard() {
        state.boxSelection = {}; PRODUCTS.slice(0,6).forEach(p=>state.boxSelection[p.name]=0);
        renderBoxOptions(); document.getElementById('box-modal').classList.remove('hidden');
    }

    function renderBoxOptions() {
        let total = Object.values(state.boxSelection).reduce((a,b)=>a+b,0);
        document.getElementById('box-counter').innerText = 12 - total;
        document.getElementById('box-options-list').innerHTML = PRODUCTS.slice(0,6).map(p=>`
            <div class="flex justify-between items-center bg-white/5 p-5 rounded-3xl border border-white/5">
                <span class="font-bold">${state.lang=='ar'?p.name:p.nameEn}</span>
                <div class="flex items-center gap-6">
                    <button onclick="updateBox('${p.name}',-1)" class="w-10 h-10 bg-red-600/20 text-red-600 rounded-full font-black">-</button>
                    <span class="font-black text-xl">${state.boxSelection[p.name]}</span>
                    <button onclick="updateBox('${p.name}',1)" class="w-10 h-10 bg-green-600/20 text-green-600 rounded-full font-black">+</button>
                </div>
            </div>`).join('');
        const btn = document.getElementById('confirm-box-btn');
        btn.className = `flex-1 py-6 rounded-3xl font-black text-xl transition-all ${total==12?'bg-green-600 opacity-100 pointer-events-auto':'bg-white/10 opacity-40 pointer-events-none'}`;
    }

    function updateBox(n,d) {
        let t = Object.values(state.boxSelection).reduce((a,b)=>a+b,0);
        if((d>0 && t<12) || (d<0 && state.boxSelection[n]>0)) { state.boxSelection[n]+=d; renderBoxOptions(); }
    }

    function confirmBoxSelection() {
        const s = Object.entries(state.boxSelection).filter(x=>x[1]>0).map(x=>`${x[0]} (${x[1]})`).join(' + ');
        state.cart.push({ id:7, name:`بوكس: ${s}`, price:150, qty:1, isBox:true });
        save(); closeBoxModal(); openCart();
    }

    function save() { localStorage.setItem('rapid_pro_cart', JSON.stringify(state.cart)); updateUI(); renderCart(); }
    function updateUI() { document.getElementById('cart-dot').innerText = state.cart.reduce((a,b)=>a+b.qty,0); }
    function renderCart() {
        let total = 0;
        document.getElementById('cart-content').innerHTML = state.cart.map((i,idx)=>{
            total += i.price*i.qty;
            return `<div class="bg-white/5 p-5 rounded-3xl border border-white/5 flex justify-between items-center">
                <div><div class="font-black text-sm mb-1">${i.name}</div><div class="text-gold font-bold">${i.price} AED</div></div>
                <div class="flex items-center gap-4 bg-black/50 p-2 rounded-xl">
                    <button onclick="updQty(${idx},-1)" class="text-red-500">-</button>
                    <span class="font-black">${i.qty}</span>
                    <button onclick="updQty(${idx},1)" class="text-green-500">+</button>
                </div>
            </div>`;
        }).join('');
        document.getElementById('cart-total').innerText = total + " AED";
    }
    function updQty(idx,d) { state.cart[idx].qty+=d; if(state.cart[idx].qty<=0) state.cart.splice(idx,1); save(); }
    function toggleTheme() { document.body.classList.toggle('light-mode'); }
    function toggleLang() { state.lang = state.lang=='ar'?'en':'ar'; document.getElementById('lang-switcher').innerText = state.lang=='ar'?'EN':'AR'; renderProducts(); }
    function viewImage(u) { document.getElementById('full-img').src = u; document.getElementById('image-overlay').classList.remove('hidden'); }
    function openSidebar() { document.getElementById('sidebar').classList.add('active-left'); document.getElementById('master-overlay').classList.remove('hidden'); }
    function openCart() { document.getElementById('cart-panel').classList.add('active-right'); document.getElementById('master-overlay').classList.remove('hidden'); renderCart(); }
    function closePanels() { document.getElementById('sidebar').classList.remove('active-left'); document.getElementById('cart-panel').classList.remove('active-right'); document.getElementById('master-overlay').classList.add('hidden'); }
    function closeBoxModal() { document.getElementById('box-modal').classList.add('hidden'); }
    function showCheckout() { if(state.cart.length) document.getElementById('checkout-modal').classList.remove('hidden'); }
    function closeCheckout() { document.getElementById('checkout-modal').classList.add('hidden'); }
    function handleFinalSubmit(e) {
        e.preventDefault();
        let m = `*طلب جديد من Rapid BH Pro*\n\nالاسم: ${document.getElementById('c-name').value}\nالهاتف: ${document.getElementById('c-phone').value}\n\n*المنتجات:*\n`;
        state.cart.forEach(i=> m+=`- ${i.name} (x${i.qty})\n`);
        m += `\n*الإجمالي: ${state.cart.reduce((a,b)=>a+(b.price*b.qty),0)} AED*`;
        window.open(`https://wa.me/971508851549?text=${encodeURIComponent(m)}`);
    }
    function setupNavScroll() { window.addEventListener('scroll', () => { window.scrollY > 50 ? document.getElementById('nav-bar').classList.add('glass-nav') : document.getElementById('nav-bar').classList.remove('glass-nav'); }); }
    function navigate(id) { document.getElementById(id).scrollIntoView({behavior:'smooth'}); closePanels(); }
    init();
</script>
</body>
