<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAPID BH PRO | الرئيسية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --primary: #e63946; --gold: #c5a028; --dark: #000000; --card: #0f0f11; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--dark); color: #fff; }
        .product-card { background: var(--card); border-radius: 35px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .grid-double { grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; }
        .grid-double .image-box { height: 160px !important; margin: 8px !important; }
        .grid-double h3 { font-size: 0.9rem !important; }
        .grid-double .hide-on-grid { display: none; }
        .image-box { height: 350px; margin: 12px; border-radius: 25px; overflow: hidden; position: relative; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<nav class="fixed top-0 w-full z-50 py-4 px-6 bg-black/80 backdrop-blur-md border-b border-white/5 flex justify-between items-center">
    <button onclick="toggleAbout()" class="text-xs font-bold text-gray-400">ABOUT US</button>
    <div class="text-xl font-black italic">RAPID BH<span class="text-red-600">PRO</span></div>
    <div class="flex items-center gap-4">
        <button onclick="toggleLayout()" class="md:hidden"><i id="layout-icon" class="fas fa-grip-vertical"></i></button>
        <a href="cart.html" class="relative">
            <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-[10px] w-4 h-4 rounded-full flex items-center justify-center">0</span>
            <i class="fas fa-shopping-bag"></i>
        </a>
    </div>
</nav>

<div id="about-modal" class="fixed inset-0 bg-black/95 z-[100] hidden p-10 flex flex-col justify-center animate__animated animate__fadeIn">
    <button onclick="toggleAbout()" class="absolute top-10 left-10 text-4xl">&times;</button>
    <h2 class="text-5xl font-black text-red-600 italic mb-6">RAPID BH PRO</h2>
    <p class="text-gray-400 text-lg mb-8 leading-relaxed">أفضل المنظفات والمعطرات الصناعية في أبوظبي. جودة احترافية تدوم طويلاً.</p>
    <div class="bg-white/5 p-6 rounded-3xl border border-white/10">
        <p class="font-bold">واتساب: 971508851549+</p>
        <p class="text-sm text-gray-500 mt-2">المقر: أبوظبي، الإمارات</p>
    </div>
</div>

<header class="h-[60vh] flex flex-col items-center justify-center text-center px-6">
    <h1 class="text-6xl font-black italic animate__animated animate__zoomIn">RAPID <span class="text-red-600">BH</span></h1>
    <p class="text-gold tracking-[8px] text-xs font-bold mt-2">INDUSTRIAL CLEANING PRO</p>
</header>

<section class="py-10 px-4 max-w-7xl mx-auto">
    <div id="products-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
</section>

<script>
    const PRODUCTS = [
        { id: 1, name: "مزيل الشحوم والزيوت", price: 15, img: "https://i.ibb.co/KzxfrNkC/IMG-7281.jpg", desc: "أقوى مزيل للدهون والأفران." },
        { id: 2, name: "مزيل البقع الصعبة", price: 15, img: "https://i.ibb.co/3mcb1trt/IMG-7284.jpg", desc: "ينظف السجاد والأقمشة بعمق." },
        { id: 3, name: "معطر جنات (فواكه)", price: 15, img: "https://i.ibb.co/Y7B86C54/IMG-7279.jpg", desc: "انتعاش الفواكه الاستوائية." },
        { id: 4, name: "معطر جنات (زهور)", price: 15, img: "https://i.ibb.co/V0nJW4CY/IMG-7280.jpg", desc: "عبير الزهور البيضاء الفاخرة." },
        { id: 5, name: "معطر جنات (عطور عربية)", price: 15, img: "https://i.ibb.co/YF8sD3p2/IMG-7285.jpg", desc: "فخامة المجالس العربية." },
        { id: 6, name: "معطر جنات (عود ملكي)", price: 15, img: "https://i.ibb.co/9mSytFrM/IMG-7278.jpg", desc: "رائحة العود الفاخرة والأصلية." },
        { id: 7, name: "بوكس التوفير (12 حبة)", price: 150, img: "https://i.ibb.co/9kCQjSsy/IMG-7517.jpg", isBox: true, desc: "وفر 30 درهم وصمم بوكسك الخاص." }
    ];

    function render() {
        const grid = document.getElementById('products-grid');
        grid.innerHTML = PRODUCTS.map(p => `
            <div class="product-card">
                <div class="image-box cursor-pointer" onclick="goToProduct(${p.id})">
                    <img src="${p.img}">
                    <div class="absolute bottom-3 left-3 bg-red-600 px-3 py-1 rounded-lg font-black text-xs">${p.price} AED</div>
                </div>
                <div class="p-6">
                    <h3 class="text-xl font-black italic mb-2">${p.name}</h3>
                    <p class="text-gray-500 text-xs mb-4 hide-on-grid">${p.desc}</p>
                    <button onclick="goToProduct(${p.id})" class="w-full bg-red-600 py-3 rounded-xl font-bold text-sm">عرض التفاصيل</button>
                </div>
            </div>
        `).join('');
    }

    function goToProduct(id) {
        window.location.href = `product.html?id=${id}`;
    }

    function toggleLayout() {
        const grid = document.getElementById('products-grid');
        grid.classList.toggle('grid-double');
    }

    function toggleAbout() {
        document.getElementById('about-modal').classList.toggle('hidden');
    }

    // تحديث عداد السلة
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    document.getElementById('cart-count').innerText = cart.length;

    render();
</script>
</body>
</html>
