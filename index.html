<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RAPID BH PRO | متجر احترافي كامل</title>
<meta name="description" content="أقوى متجر مزيلات دهون وبقع في الإمارات بنتائج خلال 60 ثانية">

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{background:#000;color:#fff;font-family:'Tajawal';overflow-x:hidden}

/* NAV */
.nav{position:fixed;top:0;width:100%;background:rgba(0,0,0,.9);backdrop-filter:blur(10px);z-index:999;padding:10px 20px;display:flex;justify-content:space-between}

/* BUTTON */
.btn{background:#e63946;padding:10px 20px;border-radius:10px;font-weight:900;transition:.3s}
.btn:hover{transform:scale(1.05);box-shadow:0 10px 20px rgba(230,57,70,.4)}

/* CARD */
.card{background:#111;border:1px solid #222;padding:20px;border-radius:20px;transition:.3s}
.card:hover{transform:translateY(-6px);border-color:#e63946}

/* PAGE */
.page{display:none;padding-top:80px}
.page.active{display:block}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:9999}
.modal.active{display:flex}

/* CART */
#cart{position:fixed;right:-400px;top:0;width:350px;height:100%;background:#111;transition:.4s;padding:20px;overflow:auto}
#cart.active{right:0}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#e63946;padding:10px 20px;border-radius:10px}

/* ANIM */
.fade{animation:fade .5s}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1}}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<div class="flex gap-4">
<button onclick="go('home')">الرئيسية</button>
<button onclick="go('store')">المتجر</button>
<button onclick="go('about')">من نحن</button>
<button onclick="go('contact')">تواصل</button>
</div>
<button onclick="toggleCart()">🛒</button>
</div>

<!-- HOME -->
<div id="home" class="page active fade text-center">
<section class="h-screen flex flex-col justify-center items-center">
<h1 class="text-5xl font-black mb-4">يزيل الدهون خلال 60 ثانية</h1>
<p class="text-gray-400 mb-6">قوة صناعية • بدون فرك</p>
<button class="btn" onclick="go('store')">تسوق</button>
</section>
</div>

<!-- STORE -->
<div id="store" class="page px-6 fade">
<h2 class="text-3xl mb-6">المنتجات</h2>

<input placeholder="بحث..." oninput="search(this.value)" class="mb-4">

<div id="products" class="grid md:grid-cols-3 gap-6"></div>
</div>

<!-- ABOUT -->
<div id="about" class="page px-6 fade">
<h2 class="text-3xl mb-4">من نحن</h2>
<p>نحن نقدم أقوى منتجات التنظيف في الإمارات بجودة عالية.</p>
</div>

<!-- CONTACT -->
<div id="contact" class="page px-6 fade">
<h2 class="text-3xl mb-4">تواصل</h2>
<input placeholder="اسمك">
<input placeholder="رسالتك" class="mt-2">
<button class="btn mt-4">إرسال</button>
</div>

<!-- CART -->
<div id="cart">
<h3>السلة</h3>
<div id="cartItems"></div>
<p id="total"></p>

<select id="shipping">
<option value="0">استلام</option>
<option value="10">شحن 10 AED</option>
</select>

<input id="coupon" placeholder="كوبون">
<button onclick="applyCoupon()" class="btn mt-2">تطبيق</button>

<button onclick="checkout()" class="btn mt-4 w-full">طلب واتساب</button>
</div>

<!-- PRODUCT MODAL -->
<div id="productModal" class="modal">
<div class="card w-96">
<h3 id="pName"></h3>
<p id="pDesc"></p>

<div id="reviews"></div>

<textarea id="newReview" placeholder="اكتب تقييمك"></textarea>
<button onclick="addReview()" class="btn mt-2">إضافة تقييم</button>

<button onclick="addToCartModal()" class="btn mt-4 w-full">شراء</button>
<button onclick="closeModal()" class="mt-2">إغلاق</button>
</div>
</div>

<script>

/* DATA */
let products=[
{id:1,name:"مزيل الدهون",price:15,desc:"يزيل خلال 60 ثانية"},
{id:2,name:"مزيل البقع",price:15,desc:"أفضل حل للبقع"},
{id:3,name:"معطر",price:15,desc:"رائحة فخمة"}
];

let cart=[];
let selectedProduct=null;

/* NAV */
function go(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* PRODUCTS */
function render(list){
let html="";
list.forEach(p=>{
html+=`
<div class="card fade">
<h3>${p.name}</h3>
<p>${p.price} AED</p>
<button class="btn mt-2" onclick="openProduct(${p.id})">عرض</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}
render(products);

/* SEARCH */
function search(q){
render(products.filter(p=>p.name.includes(q)));
}

/* PRODUCT PAGE */
function openProduct(id){
selectedProduct=products.find(p=>p.id===id);
document.getElementById("pName").innerText=selectedProduct.name;
document.getElementById("pDesc").innerText=selectedProduct.desc;
loadReviews();
document.getElementById("productModal").classList.add("active");
}

function closeModal(){
document.getElementById("productModal").classList.remove("active");
}

/* REVIEWS */
function loadReviews(){
let r=JSON.parse(localStorage.getItem("rev"+selectedProduct.id)||"[]");
document.getElementById("reviews").innerHTML=r.map(x=>`<div>${x}</div>`).join("");
}

function addReview(){
let val=document.getElementById("newReview").value;
let r=JSON.parse(localStorage.getItem("rev"+selectedProduct.id)||"[]");
r.push(val);
localStorage.setItem("rev"+selectedProduct.id,JSON.stringify(r));
loadReviews();
}

/* CART */
function addToCartModal(){
cart.push(selectedProduct);
updateCart();
toast("تمت الإضافة");
}

function updateCart(){
let html="";let total=0;
cart.forEach(i=>{html+=`<div>${i.name}</div>`;total+=i.price});
document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total+" AED";
}

/* CART UI */
function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

/* COUPON */
function applyCoupon(){
if(document.getElementById("coupon").value==="SAVE"){
toast("تم الخصم");
}else toast("خطأ");
}

/* CHECKOUT */
function checkout(){
let msg="طلب:\n";
cart.forEach(i=>msg+=i.name+"\n");
window.open("https://wa.me/971508851549?text="+encodeURIComponent(msg));
saveOrder();
}

/* ORDERS */
function saveOrder(){
let o=JSON.parse(localStorage.getItem("orders")||"[]");
o.push(cart);
localStorage.setItem("orders",JSON.stringify(o));
}

/* TOAST */
function toast(t){
let el=document.createElement("div");
el.className="toast";
el.innerText=t;
document.body.appendChild(el);
setTimeout(()=>el.remove(),2000);
}

</script>

</body>
</html>
